kind = "web"
previewPath = "/"
title = "AIforHHS"
version = "1.0.0"
id = "artifacts/aiforrhhs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18162

[services.development]
run = "pnpm --filter @workspace/aiforrhhs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aiforrhhs", "run", "build" ]
publicDir = "artifacts/aiforrhhs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18162"
BASE_PATH = "/"
